<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>DriveMaster PRO</title>
    <link rel="stylesheet" href="maincss.css">
</head>
<body>

<header class="navbar">
    <div class="logo">
        DriveMaster <span>PRO</span>
    </div>

    <nav class="nav-links">
        <a href="index.html">Начало</a>
        <a href="planner.html">Планиране</a>
        <a href="#">Автомобил</a> 
        <a href="fuel.html">Разход</a>
    </nav>
</header>

<section class="hero">
    <h1>Състояние на автомобила</h1>
    <p>Маршрути, безопасност и контрол на автомобила</p>
</section>

<section class="health-section">
    <div class="map-section">
        <div style="max-width:900px;margin:0 auto;">
            <h2>Ремонти и обслужване</h2>

            <form id="healthForm" class="trip-summary" onsubmit="return false;">
                <div class="ts-left">
                    <div class="ts-item">
                        <label class="ts-label">Дата</label>
                        <input type="date" id="healthDate" required />
                    </div>
                    <div class="ts-item">
                        <label class="ts-label">Пробег (км)</label>
                        <input type="number" id="healthOdo" required />
                    </div>
                    <div class="ts-item">
                        <label class="ts-label">Тип</label>
                        <select id="healthType">
                            <option value="Обслужване">Обслужване</option>
                            <option value="Ремонт">Ремонт</option>
                            <option value="Диагностика">Диагностика</option>
                            <option value="Друг">Друг</option>
                        </select>
                    </div>
                </div>

                <div class="ts-left" style="margin-top:12px;">
                    <div class="ts-item">
                        <label class="ts-label">Цена</label>
                        <input type="number" step="0.01" id="healthCost" placeholder="лв" />
                    </div>
                    <div class="ts-item">
                        <label class="ts-label">Извършено от</label>
                        <input type="text" id="healthPlace" placeholder="гараж / сервиз" />
                    </div>
                    <div class="ts-item">
                        <label class="ts-label">Бележка</label>
                        <input type="text" id="healthNote" placeholder="описание" />
                    </div>
                </div>

                <div class="ts-right" style="margin-top:12px;">
                    <button id="addHealth" style="padding:10px 18px;border-radius:8px;border:none;background:#38bdf8;color:#020617;font-weight:700;">Добави</button>
                </div>
            </form>

            <div style="margin-top:18px;">
                <h3>История на обслужванията</h3>
                <div id="healthList"></div>
            </div>
        </div>
    </div>
</section>

<script>
    const healthForm = document.getElementById('healthForm');
    const healthDate = document.getElementById('healthDate');
    const healthOdo = document.getElementById('healthOdo');
    const healthType = document.getElementById('healthType');
    const healthCost = document.getElementById('healthCost');
    const healthPlace = document.getElementById('healthPlace');
    const healthNote = document.getElementById('healthNote');
    const healthList = document.getElementById('healthList');

    function loadHealth() {
        const data = JSON.parse(localStorage.getItem('healthEntries') || '[]');
        healthList.innerHTML = '';
        if (!data.length) { healthList.innerHTML = '<p>Няма записи.</p>'; return; }
        data.slice().reverse().forEach(e => {
            const el = document.createElement('div');
            el.className = 'ts-item';
            el.style.margin = '8px 0';
            el.innerHTML = `<strong>${e.date}</strong> — ${e.odo} км — ${e.type} — ${e.cost?e.cost.toFixed(2)+' лв':''}${e.place?'<br/>'+e.place:''}${e.note?'<br/>'+e.note:''}`;
            healthList.appendChild(el);
        });
    }

    function saveHealthEntry() {
        const date = healthDate.value;
        const odo = Number(healthOdo.value);
        const type = healthType.value;
        const cost = Number(healthCost.value) || 0;
        if (!date || !odo) return alert('Попълнете дата и пробег');
        const data = JSON.parse(localStorage.getItem('healthEntries') || '[]');
        data.push({date, odo, type, cost, place: healthPlace.value, note: healthNote.value});
        localStorage.setItem('healthEntries', JSON.stringify(data));
        healthForm.reset();
        loadHealth();
    }

    document.getElementById('addHealth').addEventListener('click', saveHealthEntry);
    loadHealth();
</script>

</body>
</html>
