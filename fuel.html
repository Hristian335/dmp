<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>DriveMaster PRO</title>
    <link rel="stylesheet" href="maincss.css">
</head>
<body>

<header class="navbar">
    <div class="logo">
        DriveMaster <span>PRO</span>
    </div>

    <nav class="nav-links">
        <a href="index.html">Начало</a>
        <a href="planner.html">Планиране</a>
        <a href="car-health.html">Автомобил</a>
        <a href="#">Разход</a>
    </nav>
</header>

<section class="hero">
    <h1>Гориво</h1>
    <p>Маршрути, безопасност и контрол на автомобила</p>
</section>

<section class="fuel-section">
    <div class="map-section">
        <div style="max-width:900px;margin:0 auto;">
            <h2>Запис на зареждане</h2>
            <form id="fuelForm" class="trip-summary" onsubmit="return false;">
                <div class="ts-left">
                    <div class="ts-item">
                        <label class="ts-label">Дата</label>
                        <input type="date" id="fuelDate" required />
                    </div>
                    <div class="ts-item">
                        <label class="ts-label">Пробег (км)</label>
                        <input type="number" id="fuelOdo" placeholder="Откатна стойност" required />
                    </div>
                    <div class="ts-item">
                        <label class="ts-label">Литри</label>
                        <input type="number" step="0.01" id="fuelLiters" placeholder="литри" required />
                    </div>
                </div>

                <div class="ts-left" style="margin-top:12px;">
                    <div class="ts-item">
                        <label class="ts-label">Цена/литър</label>
                        <input type="number" step="0.01" id="fuelPrice" placeholder="лв" required />
                    </div>
                    <div class="ts-item">
                        <label class="ts-label">Обща цена</label>
                        <input type="number" step="0.01" id="fuelTotal" placeholder="автоматично" readonly />
                    </div>
                    <div class="ts-item">
                        <label class="ts-label">Бележка</label>
                        <input type="text" id="fuelNote" placeholder="опционално" />
                    </div>
                </div>

                <div class="ts-right" style="margin-top:12px;">
                    <button id="addFuel" style="padding:10px 18px;border-radius:8px;border:none;background:#38bdf8;color:#020617;font-weight:700;">Запази</button>
                </div>
            </form>

            <div style="margin-top:18px;">
                <h3>История</h3>
                <div id="fuelList"></div>
            </div>
        </div>
    </div>
</section>

<script>
    const fuelForm = document.getElementById('fuelForm');
    const fuelDate = document.getElementById('fuelDate');
    const fuelOdo = document.getElementById('fuelOdo');
    const fuelLiters = document.getElementById('fuelLiters');
    const fuelPrice = document.getElementById('fuelPrice');
    const fuelTotal = document.getElementById('fuelTotal');
    const fuelNote = document.getElementById('fuelNote');
    const fuelList = document.getElementById('fuelList');

    function loadFuel() {
        const data = JSON.parse(localStorage.getItem('fuelEntries') || '[]');
        fuelList.innerHTML = '';
        if (!data.length) { fuelList.innerHTML = '<p>Няма записи.</p>'; return; }
        data.slice().reverse().forEach((e, i) => {
            const el = document.createElement('div');
            el.className = 'ts-item';
            el.style.margin = '8px 0';
            el.innerHTML = `<strong>${e.date}</strong> — ${e.odo} км — ${e.liters} л — ${e.total.toFixed(2)} лв${e.note?'<br/>'+e.note:''}`;
            fuelList.appendChild(el);
        });
    }

    function saveFuelEntry() {
        const date = fuelDate.value;
        const odo = Number(fuelOdo.value);
        const liters = Number(fuelLiters.value);
        const price = Number(fuelPrice.value);
        if (!date || !odo || !liters || !price) return alert('Попълнете всички задължителни полета');
        const total = liters * price;
        fuelTotal.value = total.toFixed(2);
        const data = JSON.parse(localStorage.getItem('fuelEntries') || '[]');
        data.push({date, odo, liters, price, total, note: fuelNote.value});
        localStorage.setItem('fuelEntries', JSON.stringify(data));
        fuelForm.reset();
        loadFuel();
    }

    fuelPrice.addEventListener('input', ()=>{
        const liters = Number(fuelLiters.value) || 0;
        const price = Number(fuelPrice.value) || 0;
        fuelTotal.value = (liters * price) ? (liters * price).toFixed(2) : '';
    });

    document.getElementById('addFuel').addEventListener('click', saveFuelEntry);
    loadFuel();
</script>

</body>
</html>
